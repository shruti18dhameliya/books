<!--================================== xml with ajax  file name:ex1 ======================================-->


<div class="container">
    <div class="top">
        <div>
            <h1 id="title"></h1>
        </div>
        <div>
            <p id="description"></p>
            <button>Sign-up Now</button>
        </div>
    </div>

    <div class="benefits" id="benefits"></div>
</div>

<script>
    const xhttp = new XMLHttpRequest();
    xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {

            const xml = this.responseXML;

            document.getElementById("title").innerHTML =
                xml.getElementsByTagName("title")[0].childNodes[0].nodeValue;

            document.getElementById("description").innerHTML =
                xml.getElementsByTagName("description")[0].childNodes[0].nodeValue;

            const items = xml.getElementsByTagName("item");
            let output = "";

            for (let i = 0; i < items.length; i++) {

                let number = items[i].getElementsByTagName("number")[0].childNodes[0].nodeValue;
                let heading = items[i].getElementsByTagName("heading")[0].childNodes[0].nodeValue;
                let text = items[i].getElementsByTagName("text")[0].childNodes[0].nodeValue;

                output += `
                    <div class="benefit">
                        <h4>${number}</h4>
                        <h3>${heading}</h3>
                        <p>${text}</p>
                    </div>
                `;
            }

            document.getElementById("benefits").innerHTML = output;
        }
    };

    xhttp.open("GET", "ex1.xml", true);
    xhttp.send();
</script>
