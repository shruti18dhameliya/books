<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        .banner{
        background-image: url("assets/image/bwtop100.jpg") ;
        /* width: 100%; */
        height: 250px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
           }
    </style>
 

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/contactus.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>



     <link rel="stylesheet" href="assets/jq/owl.carousel.min.css">
    <link rel="stylesheet" href="assets/jq/owl.theme.default.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="assets/jq/owl.carousel.min.js"></script>


</head>
<body>
 <!-- ======================= contact-us ======================== -->
  <div class="banner">
    <div>
        <h1>Contact Us</h1>
        <div class="underline"></div>
    </div>
</div>

<!-- ============================  2 imagess ============================ -->
<div class="main-parent">
<div class="container">
<div class="child">
    <!-- Left Image -->

    <div class="left">
        <img src="assets/image/search.jpg" alt="Library Image">
    </div>

    <!-- Right Address Box -->
    <div class="right">

        <div class="location-icon">
            <span class="material-icons">Etrend Store</span>
       </div>

        <h3 class="title">Address:</h3>

        <p>123 Street, City, London, 789AB </p>

         <h3 class="title">phone:</h3>

        <p>(123) 4567-890  </p>

        <h3 class="title">email:</h3>

        <p>mail@example.com  </p>
 

    </div>
</div>
</div>
</div>





    
<!-- =============================== form ==================================== -->
<div class="contact-us">
<div class="contact-form">
    <h2>Contact <span>Us</span></h2>

    <form id="contactForm">

        <div class="input-box">
            <label>Name</label>
            <input type="text" id="name" class="input-field" placeholder="Enter Name">
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="text" id="email" class="input-field" placeholder="Enter Email">
        </div>

        <div class="input-box">
            <label>Mobile Number</label>
            <input type="text" id="mobile" class="input-field" placeholder="Enter Mobile Number">
        </div>

        <div class="input-box">
            <label>Subject</label>
            <input type="text" id="subject" class="input-field" placeholder="Enter Subject">
        </div>

        <div class="input-box">
            <label>Message</label>
            <textarea id="message" class="input-field" placeholder="Enter Message"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>

    </form>
</div>
</div>



<script>

document.getElementById("contactForm").addEventListener("submit", function(e) {

    e.preventDefault(); // page reload stop

    var name = document.getElementById("name").value.trim();
    var email = document.getElementById("email").value.trim();
    var mobile = document.getElementById("mobile").value.trim();
    var subject = document.getElementById("subject").value.trim();
    var message = document.getElementById("message").value.trim();

    // Empty check
    if (name === "" || email === "" || mobile === "" || subject === "" || message === "") {
        alert("Fill is not found! Please fill all fields.");
        return;
    }

    // Email check
    if (!email.includes("@") || !email.includes(".com")) {
        alert("Email must contain @ and .com");
        return;
    }

    // Mobile check
    if (mobile.length != 10 || isNaN(mobile)) {
        alert("Mobile number must be 10 digits");
        return;
    }

    alert("Form Submitted Successfully!");

    // Form clear after submit
    document.getElementById("contactForm").reset();

});

// Also clear form on page load (refresh case)
window.onload = function() {
    document.getElementById("contactForm").reset();
};

</script>


</body>
</html>
